name: Secret Scan (Gitleaks)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Read-only access is all gitleaks needs.
permissions:
  contents: read

jobs:
  gitleaks:
    name: Detect Secrets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0   # full history so gitleaks can scan all commits

      - name: Run Gitleaks
        # gitleaks/gitleaks-action v2
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Exit non-zero and fail the workflow if any secret is detected.
        # Remove 'continue-on-error: true' to block merges on detection.
