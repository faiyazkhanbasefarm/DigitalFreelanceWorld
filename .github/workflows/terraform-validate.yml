name: Terraform Validate & Security Scan

on:
  push:
    branches: [main]
    paths:
      - 'modules/**'
      - 'examples/**'
  pull_request:
    paths:
      - 'modules/**'
      - 'examples/**'
  workflow_dispatch:

# Deny all by default; each job declares only what it needs.
permissions: {}

jobs:
  validate:
    name: Validate (${{ matrix.dir }})
    runs-on: ubuntu-latest
    permissions:
      contents: read    # checkout only
    strategy:
      fail-fast: false
      matrix:
        dir:
          - modules/azure_vnet
          - examples/three_tier
          - examples/vnet_example
          - examples/dev
          - examples/prod

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "~> 1.7"

      - name: Terraform Init
        working-directory: ${{ matrix.dir }}
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: ${{ matrix.dir }}
        run: terraform validate

      - name: Terraform Format Check
        working-directory: ${{ matrix.dir }}
        run: terraform fmt -check -recursive

  security-scan:
    name: tfsec Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # upload SARIF findings to GitHub Security tab
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run tfsec
        # aquasecurity/tfsec-sarif-action v0.1.4
        uses: aquasecurity/tfsec-sarif-action@21ded20e8ca120cd9d3d6ab04ef746477542a608
        with:
          sarif_file: tfsec.sarif
          working_directory: .

      - name: Upload tfsec results to GitHub Security tab
        # github/codeql-action/upload-sarif v3
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba
        with:
          sarif_file: tfsec.sarif
          category: tfsec
